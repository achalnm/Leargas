name: Data Pipeline

on:
  schedule:
    # Run every Monday at 06:00 UTC (CSO publishes RPPI quarterly; LFS quarterly)
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Pipeline mode'
        required: false
        default: 'full'
        type: choice
        options: [full, scrape, push]

jobs:
  run-pipeline:
    name: Scrape → Process → Push to Firestore
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: packages/data-pipeline/requirements.txt

      - name: Install dependencies
        working-directory: packages/data-pipeline
        run: pip install -r requirements.txt

      - name: Write Firebase service account
        working-directory: packages/data-pipeline
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: echo "$FIREBASE_SERVICE_ACCOUNT_JSON" > service-account.json

      - name: Run pipeline
        working-directory: packages/data-pipeline
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
        run: |
          MODE="${{ github.event.inputs.mode || 'full' }}"
          if [ "$MODE" = "scrape" ]; then
            python run_pipeline.py --scrape
          elif [ "$MODE" = "push" ]; then
            python run_pipeline.py --push
          else
            python run_pipeline.py
          fi

      - name: Clean up service account
        if: always()
        working-directory: packages/data-pipeline
        run: rm -f service-account.json
